name: Bug Report
description: Report a publicly visible bug or issue
title: "[BUG] "
labels:
  - bug
assignees: []
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: The full URL where the bug can be reproduced.
      placeholder: "https://example.com/page-with-bug"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly. You can drag and drop screenshots or images directly into this field.
      placeholder: "Describe the issue and drag/drop screenshots here…"
    validations:
      required: true
