name: Update Leaderboard and Deploy

on:
  # Regenerate every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Also regenerate whenever a bug-labelled issue is opened or closed
  issues:
    types:
      - opened
      - labeled
      - closed
      - reopened

  # Deploy when code is pushed to main
  push:
    branches:
      - main

  # Allow manual runs from the Actions UI
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Add eyes reaction to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) return;

            try {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issueNumber,
                content: 'eyes',
              });
            } catch (e) {
              // Ignore if already reacted or other minor error
              console.log('Reaction failed:', e.message);
            }

      - name: Add domain label to new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Use the standard pattern for URL extraction
            const match = body.match(/### URL\s*\n\n(\S+)/);
            if (!match) return;

            let hostname = null;
            try { hostname = new URL(match[1]).hostname; } catch { /* ignore */ }
            if (!hostname) return;

            // Truncate to 50 chars to stay within GitHub's label name limit (50 chars)
            const labelName = `domain: ${hostname}`.slice(0, 50);

            // Ensure the label exists (create if missing)
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  labelName,
              });
            } catch (e) {
              if (e.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    name:  labelName,
                    color: '0075ca',
                    description: `Issues related to ${hostname}`,
                  });
                } catch (createError) {
                  // If the label was created concurrently by another workflow run,
                  // GitHub may return 422 "Unprocessable Entity" (already exists).
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              } else {
                throw e;
              }
            }
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) return;

            // Apply the label to the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issueNumber,
              labels: [labelName],
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      # Skip leaderboard data generation when this run was triggered by the
      # bot's own leaderboard-update commit (push by github-actions[bot]).
      # This prevents an infinite trigger loop while still deploying the
      # freshly-committed content.
      - name: Generate leaderboard data
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/generate_leaderboard.py

            // Commit and push the updated files
            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add data/leaderboard.json index.html');
            let hasChanges = true;
            try { execSync('git diff --quiet --cached'); hasChanges = false; } catch (e) {}
            if (!hasChanges) {
              console.log('No changes detected – skipping commit.');
            } else {
              execSync('git commit -m "chore: update leaderboard data"', { stdio: 'inherit' });
              let pushSucceeded = false;
              for (let i = 1; i <= 3; i++) {
                try {
                  execSync('git pull --rebase origin main', { stdio: 'inherit' });
                  execSync('git push', { stdio: 'inherit' });
                  pushSucceeded = true;
                  break;
                } catch (e) {
                  const status = typeof e.status !== 'undefined' ? e.status : (typeof e.code !== 'undefined' ? e.code : 'unknown');
                  const message = e && e.message ? e.message : String(e);
                  console.log(`Push attempt ${i} failed (status/code: ${status}). Error: ${message}`);
                  if (e && (e.stderr || e.stdout)) {
                    if (e.stdout) console.log('git stdout:', e.stdout.toString());
                    if (e.stderr) console.log('git stderr:', e.stderr.toString());
                  }
                  try {
                    execSync('git rebase --abort', { stdio: 'inherit' });
                  } catch (abortError) {
                    // Ignore errors if no rebase is in progress
                  }
                  if (i < 3) execSync(`sleep ${i * 5}`, { shell: true });
                }
              }
              if (!pushSucceeded) {
                throw new Error('Failed to push updated leaderboard after 3 attempts');
              }
            }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (static HTML site)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deployment.outputs.page_url }}';
            const status    = '${{ job.status }}';
            const icon      = status === 'success' ? '✅' : status === 'cancelled' ? '⚠️' : '❌';
            const eventName = context.eventName;
            const actor     = context.actor;
            const sha       = context.sha.slice(0, 7);

            let triggerLine = `**Trigger:** \`${eventName}\``;
            if (eventName === 'push') {
              triggerLine += ` by **${actor}** (${sha})`;
            } else if (eventName === 'schedule') {
              triggerLine += ` (scheduled)`;
            }

            const lines = [
              `## ${icon} GitHub Pages Deployment`,
              '',
              `**Status:** ${status}`,
              triggerLine,
            ];

            if (deployUrl) {
              lines.push(`**URL:** ${deployUrl}`);
            }

            await core.summary
              .addRaw(lines.join('\n'))
              .write();
